<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maya XR Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 2px;
    }

    nav a {
      color: #aaa;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff4d4d;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      color: #bbb;
      margin-bottom: 30px;
    }

    .btn {
      padding: 14px 30px;
      background: #ff4d4d;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1a1a;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>

<body>

<header>
  <h1>MAYA XR CLUB</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Team</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Welcome to Maya XR Club</h2>
  <p>AR • VR • XR • Web • AI</p>
  <button class="btn">Join the Club</button>
</section>

<footer>
  © 2026 Maya XR Club
</footer>

</body>
</html>
